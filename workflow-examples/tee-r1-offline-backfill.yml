# =============================================================================
# TEE R1' — Offline backfill (should now PASS; best-effort realism check)
# =============================================================================
#
# Local, mock-TEE, two-node scenario for the recovery path fixed by
# calimero-network/core#2848: a TEE that was admitted, then went OFFLINE while
# the owner created new groups/contexts, must BACKFILL that state when it comes
# back online.
#
# IMPORTANT: This workflow is a *best-effort realism check*, not the
# authoritative guard. The deterministic R1 guard is the in-process R1 test in
# core (which controls mesh timing precisely). A native merobox run is subject
# to libp2p mesh-formation timing (see tee-g1's first-publish caveat), so treat
# a red here as "investigate", not "core regressed" — confirm against the
# in-process core R1 test first.
#
# What it exercises:
#   - Owner admits a mock-TEE replica at the namespace root.
#   - The replica is STOPPED (goes offline).
#   - While offline, the owner creates a Restricted subgroup AND registers a
#     context in it.
#   - The replica is restarted (--mock-tee).
#   - After sync, the replica should have replicated the offline-created
#     context (meroctl context ls greps the context id).
#
# Run natively (macOS), meroctl on PATH for the script step:
#   PATH="/Users/xilosada/dev/calimero-work/core/target/release:$PATH" \
#   merobox bootstrap run workflow-examples/tee-r1-offline-backfill.yml \
#     --no-docker \
#     --binary-path /Users/xilosada/dev/calimero-work/core/target/release/merod
# =============================================================================

name: TEE R1' — Offline backfill (local mock, best-effort)

force_pull_image: false

nodes:
  tee-owner:
    port: 7080
    rpc_port: 7180
  tee-replica:
    port: 7081
    rpc_port: 7181

steps:
  - name: Stop the replica so we can relaunch it with --mock-tee
    type: stop_node
    nodes: tee-replica

  - name: Start the replica as a mock-TEE node (merod run --mock-tee)
    type: start_node
    nodes: tee-replica
    mock_tee: true
    wait_for_ready: true
    wait_timeout: 30

  - name: Install kv-store on owner
    type: install_application
    node: tee-owner
    path: ./workflow-examples/res/kv_store_v2.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Create namespace on owner
    type: create_namespace
    node: tee-owner
    application_id: '{{app_id}}'
    outputs:
      ns: namespaceId

  - name: Set namespace-root TeeAdmissionPolicy to accept mock attestation
    type: set_tee_admission_policy
    node: tee-owner
    group_id: '{{ns}}'
    accept_mock: true

  # A first subgroup, created up front, subscribes the owner to the namespace
  # topic (see tee-g1 rationale) so the replica's announce is received.
  - name: Owner creates an initial Restricted subgroup
    type: create_group_in_namespace
    node: tee-owner
    namespace_id: '{{ns}}'
    group_name: 'restricted-sub-1'
    outputs:
      sub1: groupId

  - name: Wait for governance + namespace subscription to settle
    type: wait
    seconds: 8

  - name: TEE fleet-join attempt 1
    type: tee_fleet_join
    node: tee-replica
    group_id: '{{ns}}'
    outputs:
      tee_pk: public_key

  - name: TEE fleet-join attempt 2 (covers a second mesh window if needed)
    type: tee_fleet_join
    node: tee-replica
    group_id: '{{ns}}'
    outputs:
      tee_pk: public_key

  - name: Assert the replica is a ReadOnlyTee member at the root
    type: assert_tee_member
    node: tee-owner
    group_id: '{{ns}}'
    identity: '{{tee_pk}}'
    role: ReadOnlyTee

  # ---------- Take the replica offline ----------
  - name: Stop the TEE replica (goes offline)
    type: stop_node
    nodes: tee-replica

  - name: Brief settle after the replica goes offline
    type: wait
    seconds: 3

  # ---------- Owner mutates state while the replica is offline ----------
  - name: Owner creates a new Restricted subgroup while replica is OFFLINE
    type: create_group_in_namespace
    node: tee-owner
    namespace_id: '{{ns}}'
    group_name: 'restricted-sub-offline'
    outputs:
      sub2: groupId

  - name: Owner registers a context in the offline-created subgroup
    type: create_context
    node: tee-owner
    application_id: '{{app_id}}'
    group_id: '{{sub2}}'
    outputs:
      offline_ctx_id: contextId

  - name: Let the offline-created state quiesce on the owner
    type: wait
    seconds: 5

  # ---------- Bring the replica back online ----------
  - name: Restart the TEE replica (--mock-tee)
    type: start_node
    nodes: tee-replica
    mock_tee: true
    wait_for_ready: true
    wait_timeout: 30

  - name: Wait for the replica to backfill offline-created state
    type: wait
    seconds: 30

  # ---------- Assert the backfilled context replicated ----------
  - name: Assert the offline-created context replicated to the TEE replica
    type: script
    target: local
    script: ./workflow-examples/scripts/assert-tee-context-replicated.sh
    args:
      - 'http://localhost:7181'
      - '{{offline_ctx_id}}'

  - name: No panics on either node
    type: assert_log_absent
    nodes: [tee-owner, tee-replica]
    patterns:
      - "panicked at"
      - "thread 'main' panicked"
      - "FATAL"

stop_all_nodes: true
