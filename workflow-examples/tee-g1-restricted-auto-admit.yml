# =============================================================================
# TEE G1 — Restricted subgroup auto-admit (GREEN)
# =============================================================================
#
# Local, mock-TEE, two-node fleet scenario. NO prod, NO MDMA, NO real TDX.
# The TEE replica is a `merod run --mock-tee` node that produces/accepts the
# all-zero mock attestation quote; the owner's namespace-root TeeAdmissionPolicy
# is set to `acceptMock: true` so the mock quote is admitted.
#
# What it proves:
#   1. A mock-TEE replica that runs `tee fleet-join` against a Restricted
#      namespace root is admitted as a ReadOnlyTee member AT THE ROOT.
#   2. When the owner later creates a Restricted subgroup under that root, the
#      already-admitted root TEE is auto-followed into the subgroup as a
#      ReadOnlyTee member (direct-row auto-follow — the Restricted path).
#
# Build the harness merod WITH mock attestation. `mock-attestation` is a
# default-OFF Cargo feature in core: a plain `cargo build -p merod` produces a
# binary with NO `--mock-tee` support, and every node below fails to boot.
#   cargo build --release -p merod --features mock-attestation
#
# Run natively (macOS) against that locally-built --mock-tee merod:
#   merobox bootstrap run workflow-examples/tee-g1-restricted-auto-admit.yml \
#     --no-docker \
#     --binary-path /Users/xilosada/dev/calimero-work/core/target/release/merod
#
# meroctl is not needed for G1 (assertions go through the admin API directly).
#
# NOTE on node boot: merobox's initial `nodes:` boot path threads the `mock_tee`
# flag, so the TEE replica is declared with `mock_tee: true` under `nodes:` below
# and boots directly as `merod run --mock-tee` — no stop/restart dance needed.
# =============================================================================

name: TEE G1 — Restricted auto-admit (local mock)

force_pull_image: false

# Enable merobox e2e isolation: clears merod's default public-devnet
# bootstrap node and assigns a private per-workflow rendezvous namespace
# (plus mDNS). Without this, two LAN nodes re-discover each other through
# the busy public devnet swarm (~28-30s), racing core's MAX_ADMISSION_WAIT
# (30s) and intermittently dropping the TEE fleet-join. Isolation makes
# discovery instant (local mDNS + private rendezvous), so the mesh forms
# in seconds. The e2e config is written into config.toml at `merod init`
# and reused across stop/restart, so it survives the start_node relaunch.
e2e_mode: true

# Two individually-defined native nodes with fixed ports so scripts/tools can
# target them deterministically.
nodes:
  tee-owner:
    port: 7080
    rpc_port: 7180
  tee-replica:
    port: 7081
    rpc_port: 7181
    # Boot the replica directly as a mock-TEE node (merod run --mock-tee).
    # Booting it mock from the start avoids the stop_node + start_node restart
    # that perturbs the gossipsub topic mesh exactly when the namespace
    # fleet-join needs a stable bidirectional mesh (the restart left the
    # replica unable to publish its TeeAttestationAnnounce to the owner —
    # NoPeersSubscribedToTopic — so admission never happened).
    mock_tee: true

steps:

  # ---------- Owner-side setup: app + namespace ----------
  - name: Install kv-store on owner (scaffolding for namespace creation)
    type: install_application
    node: tee-owner
    path: ./workflow-examples/res/kv_store_v2.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Create namespace on owner
    type: create_namespace
    node: tee-owner
    application_id: '{{app_id}}'
    outputs:
      ns: namespaceId

  # ---------- Mock TEE admission policy on the namespace root ----------
  # accept_mock + the all-zero MRTD are the step defaults, so an empty body
  # is sufficient. Set on the namespace root (== namespace id).
  - name: Set namespace-root TeeAdmissionPolicy to accept mock attestation
    type: set_tee_admission_policy
    node: tee-owner
    group_id: '{{ns}}'
    accept_mock: true

  - name: Let the policy propagate
    type: wait
    seconds: 5

  # ---------- Owner creates a Restricted subgroup FIRST ----------
  # Subgroups default to Restricted visibility. Creating it now serves two
  # purposes:
  #   (a) it subscribes the OWNER to the namespace gossipsub topic
  #       (create_group_in_namespace -> subscribe_namespace in core), which is
  #       what lets the replica's TeeAttestationAnnounce actually reach a
  #       subscribed peer — otherwise fleet-join's publish fails with
  #       NoPeersSubscribedToTopic (HTTP 500) on a fresh, otherwise-idle owner;
  #   (b) it gives us a Restricted subgroup to assert ReadOnlyTee inheritance
  #       into after admission.
  - name: Owner creates a Restricted subgroup under the namespace
    type: create_group_in_namespace
    node: tee-owner
    namespace_id: '{{ns}}'
    group_name: 'restricted-sub'
    outputs:
      sub: groupId

  - name: Wait for subgroup governance + namespace subscription to settle
    type: wait
    seconds: 8

  # ---------- TEE fleet-join (root admission) ----------
  # A single fleet-join call covers ONE mesh window (core MAX_ADMISSION_WAIT
  # ~= 30s) and returns 200 with admitted:true|false regardless. The owner
  # must have discovered the replica on the local libp2p mesh first, so we
  # issue a few sequential attempts; the truthful admission signal is the
  # `assert_tee_member` below (the owner's own member list), NOT the
  # per-call `admitted` flag — that's why we don't hard-assert on it.
  #
  # (We avoid the `repeat` step here on purpose: this branch's repeat nested
  # dispatcher doesn't yet register the tee_* step types. Sequential top-level
  # steps work today; the assert is the real gate.)
  - name: TEE fleet-join attempt 1
    type: tee_fleet_join
    node: tee-replica
    group_id: '{{ns}}'
    outputs:
      tee_pk: public_key
      tee_admitted: admitted

  - name: TEE fleet-join attempt 2 (covers a second mesh window if needed)
    type: tee_fleet_join
    node: tee-replica
    group_id: '{{ns}}'
    outputs:
      tee_pk: public_key
      tee_admitted: admitted

  - name: Assert the replica reported a namespace identity
    type: assert
    statements:
      - "is_set({{tee_pk}})"

  - name: Let root membership settle
    type: wait
    seconds: 5

  # ---------- Assert ReadOnlyTee at the root ----------
  - name: Assert the replica is a ReadOnlyTee member AT THE ROOT
    type: assert_tee_member
    node: tee-owner
    group_id: '{{ns}}'
    identity: '{{tee_pk}}'
    role: ReadOnlyTee

  # ---------- Let Restricted-subgroup auto-follow settle ----------
  # The root TEE is auto-followed into the pre-existing Restricted subgroup as
  # a ReadOnlyTee (direct-row auto-follow — the Restricted path).
  - name: Wait for subgroup auto-follow to settle
    type: wait
    seconds: 10

  # ---------- Assert ReadOnlyTee inherited into the subgroup ----------
  - name: Assert the replica is a ReadOnlyTee member of the Restricted subgroup
    type: assert_tee_member
    node: tee-owner
    group_id: '{{sub}}'
    identity: '{{tee_pk}}'
    role: ReadOnlyTee

  # ---------- Regression guard ----------
  - name: No panics on either node
    type: assert_log_absent
    nodes: [tee-owner, tee-replica]
    patterns:
      - "panicked at"
      - "thread 'main' panicked"
      - "FATAL"

stop_all_nodes: true
