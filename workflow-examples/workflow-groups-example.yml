description: >
  Demonstrates Context Group Management — creates a namespace on node 1,
  invites node 2 to join the namespace, creates a shared context inside the
  namespace, has node 2 join that context via group membership, then verifies
  state propagates correctly between both nodes.
name: Context Group Management Example

force_pull_image: true

nodes:
  count: 2
  image: ghcr.io/calimero-network/merod:edge
  prefix: calimero-node

steps:
  # Step 1: Install the application on node 1
  - name: Install Application on Node 1
    type: install_application
    node: calimero-node-1
    path: workflow-examples/res/kv_store.wasm
    dev: true
    outputs:
      app_id: applicationId

  # Step 2: Create a namespace on node 1 tied to the installed application.
  - name: Create Namespace on Node 1
    type: create_namespace
    node: calimero-node-1
    application_id: '{{app_id}}'
    outputs:
      namespace_id: namespaceId

  # Step 3: Create a context inside the namespace on node 1.
  - name: Create Group Context on Node 1
    type: create_context
    node: calimero-node-1
    application_id: '{{app_id}}'
    group_id: '{{namespace_id}}'
    outputs:
      context_id: contextId
      member_key_node1: memberPublicKey

  # Step 4: Create a namespace invitation on node 1.
  - name: Create Namespace Invitation on Node 1
    type: create_namespace_invitation
    node: calimero-node-1
    namespace_id: '{{namespace_id}}'
    outputs:
      invitation: invitation

  # Wait for namespace gossip to propagate from node 1 to node 2.
  - name: Wait for Namespace Gossip Propagation
    type: wait
    seconds: 5

  # Step 5: Node 2 joins the namespace using the invitation from node 1.
  - name: Node 2 Joins Namespace
    type: join_namespace
    node: calimero-node-2
    namespace_id: '{{namespace_id}}'
    invitation: '{{invitation}}'
    outputs:
      member_identity_node2: memberIdentity

  # Step 6: Node 2 joins the existing context via group membership.
  - name: Node 2 Joins Group Context
    type: join_context
    node: calimero-node-2
    context_id: '{{context_id}}'
    outputs:
      context_id_node2: contextId
      member_key_node2: memberPublicKey

  # Step 7: Write a value on node 1 to produce a state change.
  - name: Write Value on Node 1
    type: call
    node: calimero-node-1
    context_id: '{{context_id}}'
    method: set
    args:
      key: hello
      value: world

  # Step 8: Wait for node 2 to sync and verify both nodes have the same state.
  - name: Wait for State Sync
    type: wait_for_sync
    nodes:
      - calimero-node-1
      - calimero-node-2
    context_id: '{{context_id}}'
    timeout: 30

stop_all_nodes: false
