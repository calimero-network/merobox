# =============================================================================
# TEE G2 — Open-subgroup inheritance replication (GREEN)
# =============================================================================
#
# Local, mock-TEE, two-node scenario. An admitted root TEE should REPLICATE
# (not just be authorized for) a context registered in an Open subgroup, via
# namespace-root inheritance + auto-follow.
#
# What it proves:
#   - Owner admits a mock-TEE replica at the namespace root.
#   - Owner creates a subgroup, flips it to Open, and registers a context in it.
#   - The TEE replica replicates that context: `meroctl context ls` on the
#     replica lists the context id (the `script` step greps for it).
#
# Run natively (macOS), with the locally-built --mock-tee merod on PATH so the
# `script` step's meroctl resolves to it:
#   PATH="/Users/xilosada/dev/calimero-work/core/target/release:$PATH" \
#   merobox bootstrap run workflow-examples/tee-g2-open-inheritance-replication.yml \
#     --no-docker \
#     --binary-path /Users/xilosada/dev/calimero-work/core/target/release/merod
#
# NOTE: like all of these local scenarios, root admission depends on the
# fleet-join announce reaching a namespace-subscribed owner over the local
# libp2p mesh; see tee-g1 for the boot/admit mechanics and the known
# first-publish mesh-timing caveat in core's fleet_join handler.
# =============================================================================

name: TEE G2 — Open inheritance replication (local mock)

force_pull_image: false

nodes:
  tee-owner:
    port: 7080
    rpc_port: 7180
  tee-replica:
    port: 7081
    rpc_port: 7181

steps:
  - name: Stop the replica so we can relaunch it with --mock-tee
    type: stop_node
    nodes: tee-replica

  - name: Start the replica as a mock-TEE node (merod run --mock-tee)
    type: start_node
    nodes: tee-replica
    mock_tee: true
    wait_for_ready: true
    wait_timeout: 30

  - name: Install kv-store on owner
    type: install_application
    node: tee-owner
    path: ./workflow-examples/res/kv_store_v2.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Create namespace on owner
    type: create_namespace
    node: tee-owner
    application_id: '{{app_id}}'
    outputs:
      ns: namespaceId

  - name: Set namespace-root TeeAdmissionPolicy to accept mock attestation
    type: set_tee_admission_policy
    node: tee-owner
    group_id: '{{ns}}'
    accept_mock: true

  # Create the subgroup up front so the owner subscribes to the namespace topic
  # (see tee-g1 rationale) before the replica announces.
  - name: Owner creates a subgroup under the namespace
    type: create_group_in_namespace
    node: tee-owner
    namespace_id: '{{ns}}'
    group_name: 'open-sub'
    outputs:
      sub: groupId

  - name: Flip the subgroup to Open visibility
    type: set_subgroup_visibility
    node: tee-owner
    group_id: '{{sub}}'
    visibility: open

  - name: Wait for governance + namespace subscription to settle
    type: wait
    seconds: 8

  # ---------- TEE fleet-join (root admission) ----------
  - name: TEE fleet-join attempt 1
    type: tee_fleet_join
    node: tee-replica
    group_id: '{{ns}}'
    outputs:
      tee_pk: public_key

  - name: TEE fleet-join attempt 2 (covers a second mesh window if needed)
    type: tee_fleet_join
    node: tee-replica
    group_id: '{{ns}}'
    outputs:
      tee_pk: public_key

  - name: Assert the replica is a ReadOnlyTee member at the root
    type: assert_tee_member
    node: tee-owner
    group_id: '{{ns}}'
    identity: '{{tee_pk}}'
    role: ReadOnlyTee

  # ---------- Register a context in the Open subgroup ----------
  - name: Owner registers a context in the Open subgroup
    type: create_context
    node: tee-owner
    application_id: '{{app_id}}'
    group_id: '{{sub}}'
    outputs:
      ctx_id: contextId

  - name: Wait for context replication into the TEE replica
    type: wait
    seconds: 20

  # ---------- Prove replication: context id is on the TEE replica ----------
  - name: Assert the context replicated to the TEE replica (meroctl context ls)
    type: script
    target: local
    script: ./workflow-examples/scripts/assert-tee-context-replicated.sh
    args:
      - 'http://localhost:7181'
      - '{{ctx_id}}'

  - name: No panics on either node
    type: assert_log_absent
    nodes: [tee-owner, tee-replica]
    patterns:
      - "panicked at"
      - "thread 'main' panicked"
      - "FATAL"

stop_all_nodes: true
