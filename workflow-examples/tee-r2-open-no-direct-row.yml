# =============================================================================
# TEE R2 — Open subgroup has NO direct ReadOnlyTee row (EXPECTED RED)
# =============================================================================
#
# EXPECTED TO FAIL until born-Open atomic create (calimero-network/core#2771)
# lands.
#
# Local, mock-TEE, two-node scenario documenting the #2771 gap: when a TEE is
# inherited into an Open subgroup, NO direct ReadOnlyTee membership row is ever
# materialised for it in that subgroup. The TEE is functionally a member via
# namespace-root inheritance, but a node-local `meroctl group members list
# <open_gid>` on the replica has no direct row to key on and fails with
# "no group identity configured" (an inherited-only member).
#
# The final `script` step asserts that the replica DOES carry a direct
# ReadOnlyTee row in the Open subgroup — which it does NOT today — so this
# scenario is EXPECTED RED. When #2771 lands (born-Open atomic create
# materialises the direct row), the script flips to green and this scenario
# should be promoted to a GREEN guard.
#
# Run natively (macOS), meroctl on PATH for the script step:
#   PATH="/Users/xilosada/dev/calimero-work/core/target/release:$PATH" \
#   merobox bootstrap run workflow-examples/tee-r2-open-no-direct-row.yml \
#     --no-docker \
#     --binary-path /Users/xilosada/dev/calimero-work/core/target/release/merod
#
# See tee-g1 for the boot/admit mechanics and the known first-publish
# mesh-timing caveat in core's fleet_join handler.
# =============================================================================

name: TEE R2 — Open no-direct-row (#2771, EXPECTED RED)

force_pull_image: false

nodes:
  tee-owner:
    port: 7080
    rpc_port: 7180
  tee-replica:
    port: 7081
    rpc_port: 7181

steps:
  - name: Stop the replica so we can relaunch it with --mock-tee
    type: stop_node
    nodes: tee-replica

  - name: Start the replica as a mock-TEE node (merod run --mock-tee)
    type: start_node
    nodes: tee-replica
    mock_tee: true
    wait_for_ready: true
    wait_timeout: 30

  - name: Install kv-store on owner
    type: install_application
    node: tee-owner
    path: ./workflow-examples/res/kv_store_v2.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Create namespace on owner
    type: create_namespace
    node: tee-owner
    application_id: '{{app_id}}'
    outputs:
      ns: namespaceId

  - name: Set namespace-root TeeAdmissionPolicy to accept mock attestation
    type: set_tee_admission_policy
    node: tee-owner
    group_id: '{{ns}}'
    accept_mock: true

  - name: Owner creates a subgroup under the namespace
    type: create_group_in_namespace
    node: tee-owner
    namespace_id: '{{ns}}'
    group_name: 'open-sub'
    outputs:
      sub: groupId

  - name: Flip the subgroup to Open visibility
    type: set_subgroup_visibility
    node: tee-owner
    group_id: '{{sub}}'
    visibility: open

  - name: Owner registers a context in the Open subgroup
    type: create_context
    node: tee-owner
    application_id: '{{app_id}}'
    group_id: '{{sub}}'
    outputs:
      ctx_id: contextId

  - name: Wait for governance + namespace subscription to settle
    type: wait
    seconds: 8

  - name: TEE fleet-join attempt 1
    type: tee_fleet_join
    node: tee-replica
    group_id: '{{ns}}'
    outputs:
      tee_pk: public_key

  - name: TEE fleet-join attempt 2 (covers a second mesh window if needed)
    type: tee_fleet_join
    node: tee-replica
    group_id: '{{ns}}'
    outputs:
      tee_pk: public_key

  - name: Assert the replica is a ReadOnlyTee member at the root
    type: assert_tee_member
    node: tee-owner
    group_id: '{{ns}}'
    identity: '{{tee_pk}}'
    role: ReadOnlyTee

  - name: Wait for Open-subgroup inheritance to settle
    type: wait
    seconds: 15

  # ---------- EXPECTED RED: no direct ReadOnlyTee row on the replica ----------
  # The replica is a pure inherited member of the Open subgroup; it has no
  # direct group identity / ReadOnlyTee row, so a node-local member-list lookup
  # has nothing to return. This script asserts the (absent today) direct row
  # and is therefore EXPECTED TO FAIL until #2771 lands.
  - name: Assert direct ReadOnlyTee row in Open subgroup on replica (EXPECTED RED)
    type: script
    target: local
    script: ./workflow-examples/scripts/assert-tee-inherited-only.sh
    args:
      - 'http://localhost:7181'
      - '{{sub}}'

stop_all_nodes: true
