# =============================================================================
# TEE G4 — Inherited ReadOnlyTee role in an Open subgroup (GREEN)
# =============================================================================
#
# Local, mock-TEE, two-node scenario. An admitted root TEE that is inherited
# into an Open subgroup must carry the ReadOnlyTee role there (not a downgraded
# or generic Member role).
#
# What it proves:
#   - Owner admits a mock-TEE replica at the namespace root.
#   - Owner creates a subgroup and flips it to Open.
#   - The TEE is a member of the Open subgroup with role == ReadOnlyTee
#     (assert_tee_member with role: ReadOnlyTee against the Open subgroup id).
#
# Run natively (macOS):
#   merobox bootstrap run workflow-examples/tee-g4-inherited-role.yml \
#     --no-docker \
#     --binary-path /Users/xilosada/dev/calimero-work/core/target/release/merod
#
# See tee-g1 for the boot/admit mechanics and the known first-publish
# mesh-timing caveat in core's fleet_join handler.
# =============================================================================

name: TEE G4 — Inherited ReadOnlyTee role (local mock)

force_pull_image: false

nodes:
  tee-owner:
    port: 7080
    rpc_port: 7180
  tee-replica:
    port: 7081
    rpc_port: 7181

steps:
  - name: Stop the replica so we can relaunch it with --mock-tee
    type: stop_node
    nodes: tee-replica

  - name: Start the replica as a mock-TEE node (merod run --mock-tee)
    type: start_node
    nodes: tee-replica
    mock_tee: true
    wait_for_ready: true
    wait_timeout: 30

  - name: Install kv-store on owner
    type: install_application
    node: tee-owner
    path: ./workflow-examples/res/kv_store_v2.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Create namespace on owner
    type: create_namespace
    node: tee-owner
    application_id: '{{app_id}}'
    outputs:
      ns: namespaceId

  - name: Set namespace-root TeeAdmissionPolicy to accept mock attestation
    type: set_tee_admission_policy
    node: tee-owner
    group_id: '{{ns}}'
    accept_mock: true

  - name: Owner creates a subgroup under the namespace
    type: create_group_in_namespace
    node: tee-owner
    namespace_id: '{{ns}}'
    group_name: 'open-sub'
    outputs:
      sub: groupId

  - name: Flip the subgroup to Open visibility
    type: set_subgroup_visibility
    node: tee-owner
    group_id: '{{sub}}'
    visibility: open

  - name: Wait for governance + namespace subscription to settle
    type: wait
    seconds: 8

  - name: TEE fleet-join attempt 1
    type: tee_fleet_join
    node: tee-replica
    group_id: '{{ns}}'
    outputs:
      tee_pk: public_key

  - name: TEE fleet-join attempt 2 (covers a second mesh window if needed)
    type: tee_fleet_join
    node: tee-replica
    group_id: '{{ns}}'
    outputs:
      tee_pk: public_key

  - name: Assert the replica is a ReadOnlyTee member at the root
    type: assert_tee_member
    node: tee-owner
    group_id: '{{ns}}'
    identity: '{{tee_pk}}'
    role: ReadOnlyTee

  - name: Wait for Open-subgroup inheritance to settle
    type: wait
    seconds: 10

  # ---------- Assert inherited ReadOnlyTee role in the Open subgroup ----------
  - name: Assert the TEE carries role ReadOnlyTee in the Open subgroup
    type: assert_tee_member
    node: tee-owner
    group_id: '{{sub}}'
    identity: '{{tee_pk}}'
    role: ReadOnlyTee

  - name: No panics on either node
    type: assert_log_absent
    nodes: [tee-owner, tee-replica]
    patterns:
      - "panicked at"
      - "thread 'main' panicked"
      - "FATAL"

stop_all_nodes: true
