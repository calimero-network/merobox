name: Test DEB Package

on:
  pull_request:
    branches: [master]

jobs:
  test-deb-package:
    name: Test .deb package installation and runtime
    runs-on: ubuntu-24.04-8cpu
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential dpkg-dev

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller merobox.spec
          ./dist/merobox --version

      - name: Determine version
        id: version
        run: |
          VERSION=$(grep '^__version__ = ' merobox/__init__.py | sed 's/__version__ = "\(.*\)"/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Build .deb package
        run: |
          chmod +x packaging/apt/build-deb.sh
          mkdir -p debs
          OUTPUT_DIR=debs ./packaging/apt/build-deb.sh "${{ steps.version.outputs.version }}" ./dist/merobox amd64

      - name: Install .deb package
        run: |
          echo "=== Installing .deb package ==="
          sudo dpkg -i debs/*.deb || sudo apt-get install -f -y
          dpkg -l | grep merobox

      - name: Test merobox --version
        run: |
          echo "=== Testing merobox --version ==="
          merobox --version

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache merod build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            /tmp/core-build/target
          key: merod-deb-build-${{ runner.os }}-${{ hashFiles('.github/workflows/test-deb-package.yml') }}
          restore-keys: merod-deb-build-${{ runner.os }}-

      - name: Build merod from core master
        run: |
          echo "Building merod from calimero-network/core master..."
          git clone --depth 1 https://github.com/calimero-network/core.git /tmp/core-build/src || true
          cd /tmp/core-build/src
          git fetch origin master && git checkout master && git pull --ff-only
          CARGO_TARGET_DIR=/tmp/core-build/target cargo build --release -p merod
          sudo cp /tmp/core-build/target/release/merod /usr/local/bin/
          merod --version
          echo "merod built and installed successfully!"

      - name: Set up Rust (wasm32 target for workflow apps)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build workflow WASM apps (kv_store, blobs from calimero-network/core)
        run: |
          chmod +x workflow-examples/scripts/build_res_wasm.sh
          ./workflow-examples/scripts/build_res_wasm.sh

      - name: Test merobox bootstrap run workflow
        run: |
          echo "=== Testing merobox bootstrap run workflow-example.yml ==="
          for attempt in 1 2; do
            echo "Attempt $attempt/2..."
            if merobox bootstrap run workflow-examples/workflow-example.yml \
              --no-docker \
              --e2e-mode; then
              echo "Workflow completed successfully"
              exit 0
            fi
            merobox stop --all --no-docker || true
            merobox nuke -f || true
            [ "$attempt" -eq 1 ] && echo "First attempt failed, retrying..." || true
          done
          echo "Workflow failed after 2 attempts"
          exit 1

      - name: Cleanup
        if: always()
        run: |
          merobox stop --all --no-docker || true
          merobox nuke -f || true
          sudo dpkg -r merobox || true
