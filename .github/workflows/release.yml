name: Release Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-source:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    - name: Build source distribution
      run: python -m build --outdir dist
    - uses: actions/upload-artifact@v4
      with:
        name: source-distribution
        path: dist/*
        retention-days: 1
    - name: Test package installation
      if: github.event_name == 'pull_request'
      run: |
        pip install -r requirements.txt
        pip install -e .
        merobox --version

  check-version:
    name: Check version bump
    runs-on: ubuntu-latest
    needs: [build-source]
    permissions:
      contents: write
      actions: write
    outputs:
      version-bumped: ${{ steps.check.outputs.bumped }}
      current-version: ${{ steps.check.outputs.current_version }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - name: Check version changes
      id: check
      run: |
        CURRENT_VERSION=$(grep '^__version__ = ' merobox/__init__.py | sed 's/__version__ = "\(.*\)"/\1/')
        echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "PR dry-run mode: treating as version bumped"
          echo "bumped=true" >> $GITHUB_OUTPUT
        else
          PREVIOUS_VERSION=$(git show HEAD~1:merobox/__init__.py | grep '^__version__ = ' | sed 's/__version__ = "\(.*\)"/\1/' || echo "0.0.0")
          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "bumped=true" >> $GITHUB_OUTPUT
          else
            echo "bumped=false" >> $GITHUB_OUTPUT
          fi
        fi
    - name: Create and push tag
      if: |
        steps.check.outputs.bumped == 'true' &&
        github.ref == 'refs/heads/master' &&
        github.event_name != 'pull_request'
      run: |
        TAG="v${{ steps.check.outputs.current_version }}"
        if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
          echo "Tag $TAG already exists"
        else
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
        fi
    - name: Comment on commit
      if: steps.check.outputs.bumped == 'true'
      uses: peter-evans/commit-comment@v3
      with:
        body: |
          **Auto-tagged release v${{ steps.check.outputs.current_version }}**

          Release pipeline running: [Actions](https://github.com/${{ github.repository }}/actions)

  build-binaries:
    runs-on: ${{ matrix.os }}
    needs: check-version
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master' || github.event_name == 'pull_request') &&
      (needs.check-version.outputs.version-bumped == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request')
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04-8cpu
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      - name: Install system dependencies (macOS)
        if: startsWith(matrix.os, 'macos')
        run: brew install gcc
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build executable
        run: pyinstaller merobox.spec
      - name: Test executable
        run: ./dist/merobox --version
      - name: Verify architecture
        run: |
          file_output=$(file ./dist/merobox)
          case "${{ matrix.target }}" in
            "aarch64-unknown-linux-gnu")
              [[ "$file_output" == *"aarch64"* ]] || exit 1 ;;
            "x86_64-unknown-linux-gnu")
              [[ "$file_output" == *"x86-64"* ]] || [[ "$file_output" == *"x86_64"* ]] || exit 1 ;;
            "aarch64-apple-darwin")
              [[ "$file_output" == *"arm64"* ]] || exit 1 ;;
            "x86_64-apple-darwin")
              [[ "$file_output" == *"x86_64"* ]] || exit 1 ;;
          esac
      - name: Determine version tag
        id: version
        run: echo "tag=v${{ needs.check-version.outputs.current-version }}" >> $GITHUB_OUTPUT
      - name: Name artifact
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          case "${{ matrix.target }}" in
            "x86_64-unknown-linux-gnu") TARGET_NAME="linux-x86-64" ;;
            "aarch64-unknown-linux-gnu") TARGET_NAME="linux-aarch64" ;;
            "x86_64-apple-darwin") TARGET_NAME="darwin-x86-64" ;;
            "aarch64-apple-darwin") TARGET_NAME="darwin-aarch64" ;;
          esac
          mv "dist/merobox" "dist/merobox-${TAG}-${TARGET_NAME}"
      - name: Generate checksum
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          case "${{ matrix.target }}" in
            "x86_64-unknown-linux-gnu") TARGET_NAME="linux-x86-64" ;;
            "aarch64-unknown-linux-gnu") TARGET_NAME="linux-aarch64" ;;
            "x86_64-apple-darwin") TARGET_NAME="darwin-x86-64" ;;
            "aarch64-apple-darwin") TARGET_NAME="darwin-aarch64" ;;
          esac
          FILE="dist/merobox-${TAG}-${TARGET_NAME}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${FILE}" > "${FILE}.sha256"
          else
            shasum -a 256 "${FILE}" | awk '{print $1 "  " FILENAME}' FILENAME="${FILE##dist/}" > "${FILE}.sha256"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: merobox-${{ matrix.target }}
          path: dist/merobox-*
          retention-days: 30

  create-release:
    needs: [check-version, build-binaries]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.build-binaries.result == 'success' &&
      github.ref == 'refs/heads/master' &&
      needs.check-version.outputs.version-bumped == 'true' &&
      github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - name: Determine version tag
        id: version
        run: echo "tag=v${{ needs.check-version.outputs.current-version }}" >> $GITHUB_OUTPUT
      - name: Validate tag format
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || exit 1
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: merobox-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-source, check-version, create-release]
    if: |
      always() &&
      github.ref == 'refs/heads/master' &&
      needs.check-version.outputs.version-bumped == 'true' &&
      needs.create-release.result == 'success'
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: source-distribution
        path: dist/
    - name: Verify distributions
      run: ls -la dist/
    - uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
        packages-dir: dist/

  notify-completion:
    needs: [build-source, check-version, build-binaries, create-release, publish-pypi]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report status
        run: |
          echo "Release Pipeline Complete"
          echo "Version: ${{ needs.check-version.outputs.current-version }}"
          echo "Build Source: ${{ needs.build-source.result }}"
          echo "Check Version: ${{ needs.check-version.result }}"
          echo "Build Binaries: ${{ needs.build-binaries.result }}"
          echo "Create Release: ${{ needs.create-release.result }}"
          echo "Publish PyPI: ${{ needs.publish-pypi.result }}"
