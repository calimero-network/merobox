name: CI - Format Check & Merobox Integration Testing

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CALIMERO_CONTRACTS_VERSION: "latest"

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check code formatting
        run: |
          make format-check

      - name: Show formatting differences on failure
        if: failure()
        run: |
          echo "❌ Code formatting check failed!"
          echo "💡 To fix locally, run: make format"
          echo "📋 Showing differences:"
          make format-check || true

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install merobox in development mode
        run: |
          pip install -e .

      - name: Run unit tests
        run: |
          python -m pytest merobox/tests/unit -v --tb=short

  # ── Discover workflow files for matrix ──
  list-workflows:
    name: Discover workflows
    runs-on: ubuntu-latest
    outputs:
      binary: ${{ steps.set.outputs.binary }}
      docker: ${{ steps.set.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: |
          # Binary mode: all workflows except fuzzy and auth-related
          BINARY=$(ls workflow-examples/*.yml | \
            grep -v fuzzy-kv-store | \
            grep -v auth-example | \
            grep -v auth-image | \
            grep -v cached-frontends | \
            jq -R -s -c 'split("\n") | map(select(length > 0)) | map({file: ., name: (split("/")[-1] | sub("\\.yml$";"") | sub("^workflow-";""))})')
          echo "binary=$BINARY" >> $GITHUB_OUTPUT

          # Docker mode: same but also exclude binary-only workflow
          DOCKER=$(ls workflow-examples/*.yml | \
            grep -v fuzzy-kv-store | \
            grep -v auth-example | \
            grep -v auth-image | \
            grep -v cached-frontends | \
            grep -v example-binary | \
            jq -R -s -c 'split("\n") | map(select(length > 0)) | map({file: ., name: (split("/")[-1] | sub("\\.yml$";"") | sub("^workflow-";""))})')
          echo "docker=$DOCKER" >> $GITHUB_OUTPUT

  # ── Build phase: download merod + build WASM apps ──
  build-binary:
    name: Build (binary mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download pre-built merod from latest core release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the latest release tag (including pre-releases / RCs)
          TAG=$(gh release list --repo calimero-network/core --limit 1 --json tagName --jq '.[0].tagName')
          echo "Downloading merod from calimero-network/core release: $TAG"
          gh release download "$TAG" --repo calimero-network/core \
            --pattern "merod_x86_64-unknown-linux-gnu.tar.gz" \
            --output /tmp/merod.tar.gz --clobber
          tar -xzf /tmp/merod.tar.gz -C /tmp
          chmod +x /tmp/merod
          /tmp/merod --version
          echo "✓ merod $TAG downloaded"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build workflow WASM apps
        run: |
          chmod +x workflow-examples/scripts/build_res_wasm.sh
          ./workflow-examples/scripts/build_res_wasm.sh

      - name: Upload merod binary
        uses: actions/upload-artifact@v4
        with:
          name: merod-binary
          path: /tmp/merod
          retention-days: 1

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-apps
          path: workflow-examples/res/
          retention-days: 1

  # ── Test phase (binary): run each workflow in parallel ──
  test-merobox:
    name: Binary (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [build-binary, list-workflows]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.list-workflows.outputs.binary) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Download merod binary
        uses: actions/download-artifact@v4
        with:
          name: merod-binary
          path: /tmp

      - name: Install merod
        run: |
          chmod +x /tmp/merod
          sudo cp /tmp/merod /usr/local/bin/
          merod --version

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-apps
          path: workflow-examples/res/

      - name: Run ${{ matrix.name }}
        run: |
          chmod +x workflow-examples/scripts/run_with_retry.sh
          ./workflow-examples/scripts/run_with_retry.sh "${{ matrix.file }}" --no-docker

  # ── Test phase (Docker): run each workflow in parallel ──
  test-merobox-docker:
    name: Docker (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [list-workflows]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.list-workflows.outputs.docker) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Docker
        uses: docker/setup-buildx-action@v3

      - name: Start Docker daemon
        run: |
          sudo systemctl start docker
          sudo docker --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Set up Rust (wasm32 target for workflow apps)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build workflow WASM apps
        run: |
          chmod +x workflow-examples/scripts/build_res_wasm.sh
          ./workflow-examples/scripts/build_res_wasm.sh

      - name: Run ${{ matrix.name }}
        run: |
          chmod +x workflow-examples/scripts/run_with_retry.sh
          ./workflow-examples/scripts/run_with_retry.sh "${{ matrix.file }}"

  test-merobox-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Docker
        uses: docker/setup-buildx-action@v3

      - name: Start Docker daemon
        run: |
          sudo systemctl start docker
          sudo docker --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install merobox in development mode
        run: |
          pip install -e .

      - name: Install example project dependencies
        run: |
          cd example-project
          pip install -r requirements.txt

      - name: Run merobox integration tests
        run: |
          echo "Performing initial cleanup..."
          merobox stop --all || true
          merobox nuke -f || true
          cd example-project
          echo "🧪 Running merobox integration test suite..."

          echo "🧪 Running merobox integration tests..."
          python -m pytest tests/test_merobox_integration.py -v --tb=short

          echo "✅ All merobox integration tests completed successfully!"
          echo "Cleaning up after integration tests..."
          cd .. && merobox stop --all || true
          merobox nuke -f || true
