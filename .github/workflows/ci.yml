name: CI - Format Check & Merobox Integration Testing

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CALIMERO_CONTRACTS_VERSION: "latest"

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check code formatting
        run: |
          make format-check

      - name: Show formatting differences on failure
        if: failure()
        run: |
          echo "❌ Code formatting check failed!"
          echo "💡 To fix locally, run: make format"
          echo "📋 Showing differences:"
          make format-check || true

  test-unit:
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install merobox in development mode
        run: |
          pip install -e .

      - name: Run unit tests
        run: |
          python -m pytest merobox/tests/unit -v --tb=short

  # ── Build phase: compile merod + WASM apps, upload as artifacts ──
  build-binary:
    name: Build (binary mode)
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache merod build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            /tmp/core-build/target
          key: merod-build-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: merod-build-${{ runner.os }}-

      - name: Build merod from core master
        run: |
          echo "Building merod from calimero-network/core master..."
          git clone --depth 1 https://github.com/calimero-network/core.git /tmp/core-build/src || true
          cd /tmp/core-build/src
          git fetch origin master && git checkout master && git pull --ff-only
          CARGO_TARGET_DIR=/tmp/core-build/target cargo build --release -p merod
          cp /tmp/core-build/target/release/merod /tmp/merod
          /tmp/merod --version

      - name: Build workflow WASM apps
        run: |
          chmod +x workflow-examples/scripts/build_res_wasm.sh
          ./workflow-examples/scripts/build_res_wasm.sh

      - name: Upload merod binary
        uses: actions/upload-artifact@v4
        with:
          name: merod-binary
          path: /tmp/merod
          retention-days: 1

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-apps
          path: workflow-examples/res/
          retention-days: 1

  # ── Test phase (binary): run each workflow in parallel ──
  test-merobox:
    name: Binary (${{ matrix.workflow_name }})
    runs-on: ubuntu-latest
    needs: build-binary
    strategy:
      fail-fast: false
      matrix:
        include:
          - workflow_name: example
            file: workflow-examples/workflow-example.yml
          - workflow_name: mesh
            file: workflow-examples/workflow-mesh-example.yml
          - workflow_name: groups
            file: workflow-examples/workflow-groups-example.yml
          - workflow_name: subgroups
            file: workflow-examples/workflow-subgroups-example.yml
          - workflow_name: assert
            file: workflow-examples/workflow-assert-example.yml
          - workflow_name: blob-upload
            file: workflow-examples/workflow-blob-upload-example.yml
          - workflow_name: context-loop
            file: workflow-examples/workflow-context-loop.yml
          - workflow_name: custom-outputs
            file: workflow-examples/workflow-custom-outputs-example.yml
          - workflow_name: execute-variables
            file: workflow-examples/workflow-execute-variables-example.yml
          - workflow_name: nested-json
            file: workflow-examples/workflow-nested-json-parsing-example.yml
          - workflow_name: nuke
            file: workflow-examples/workflow-nuke-example.yml
          - workflow_name: open-invitation
            file: workflow-examples/workflow-open-invitation-example.yml
          - workflow_name: propagation
            file: workflow-examples/workflow-propagation-monitoring.yml
          - workflow_name: repeat
            file: workflow-examples/workflow-repeat-example.yml
          - workflow_name: restart
            file: workflow-examples/workflow-restart-example.yml
          - workflow_name: script
            file: workflow-examples/workflow-script-test.yml
          - workflow_name: wait-for-sync
            file: workflow-examples/workflow-wait-for-sync-example.yml
          - workflow_name: negative-testing
            file: workflow-examples/workflow-negative-testing-example.yml
          - workflow_name: benchmark
            file: workflow-examples/kv-store-benchmark.yml
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Download merod binary
        uses: actions/download-artifact@v4
        with:
          name: merod-binary
          path: /tmp

      - name: Install merod
        run: |
          chmod +x /tmp/merod
          sudo cp /tmp/merod /usr/local/bin/
          merod --version

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-apps
          path: workflow-examples/res/

      - name: Run ${{ matrix.workflow_name }}
        run: |
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
              if [ $attempt -gt 1 ]; then
                  merobox stop --all --no-docker || true
                  merobox nuke -f || true
                  sleep 2
              fi
              if merobox bootstrap run "${{ matrix.file }}" \
                  --no-docker \
                  --e2e-mode; then
                  echo "✅ ${{ matrix.workflow_name }} passed"
                  exit 0
              fi
              attempt=$((attempt + 1))
          done
          merobox stop --all --no-docker || true
          merobox nuke -f || true
          echo "❌ ${{ matrix.workflow_name }} failed after $max_attempts attempts"
          exit 1

  # ── Test phase (Docker): run each workflow in parallel ──
  test-merobox-docker:
    name: Docker (${{ matrix.workflow_name }})
    runs-on: ubuntu-latest
    needs: format
    strategy:
      fail-fast: false
      matrix:
        include:
          - workflow_name: example
            file: workflow-examples/workflow-example.yml
          - workflow_name: mesh
            file: workflow-examples/workflow-mesh-example.yml
          - workflow_name: groups
            file: workflow-examples/workflow-groups-example.yml
          - workflow_name: subgroups
            file: workflow-examples/workflow-subgroups-example.yml
          - workflow_name: assert
            file: workflow-examples/workflow-assert-example.yml
          - workflow_name: blob-upload
            file: workflow-examples/workflow-blob-upload-example.yml
          - workflow_name: context-loop
            file: workflow-examples/workflow-context-loop.yml
          - workflow_name: custom-outputs
            file: workflow-examples/workflow-custom-outputs-example.yml
          - workflow_name: execute-variables
            file: workflow-examples/workflow-execute-variables-example.yml
          - workflow_name: nested-json
            file: workflow-examples/workflow-nested-json-parsing-example.yml
          - workflow_name: nuke
            file: workflow-examples/workflow-nuke-example.yml
          - workflow_name: open-invitation
            file: workflow-examples/workflow-open-invitation-example.yml
          - workflow_name: propagation
            file: workflow-examples/workflow-propagation-monitoring.yml
          - workflow_name: repeat
            file: workflow-examples/workflow-repeat-example.yml
          - workflow_name: restart
            file: workflow-examples/workflow-restart-example.yml
          - workflow_name: script
            file: workflow-examples/workflow-script-test.yml
          - workflow_name: wait-for-sync
            file: workflow-examples/workflow-wait-for-sync-example.yml
          - workflow_name: negative-testing
            file: workflow-examples/workflow-negative-testing-example.yml
          - workflow_name: force-pull
            file: workflow-examples/workflow-force-pull-test.yml
          - workflow_name: benchmark
            file: workflow-examples/kv-store-benchmark.yml
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Docker
        uses: docker/setup-buildx-action@v3

      - name: Start Docker daemon
        run: |
          sudo systemctl start docker
          sudo docker --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Set up Rust (wasm32 target for workflow apps)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build workflow WASM apps
        run: |
          chmod +x workflow-examples/scripts/build_res_wasm.sh
          ./workflow-examples/scripts/build_res_wasm.sh

      - name: Run ${{ matrix.workflow_name }}
        run: |
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
              if [ $attempt -gt 1 ]; then
                  merobox stop --all || true
                  merobox nuke -f || true
                  sleep 2
              fi
              if merobox bootstrap run "${{ matrix.file }}" \
                  --e2e-mode; then
                  echo "✅ ${{ matrix.workflow_name }} passed"
                  exit 0
              fi
              attempt=$((attempt + 1))
          done
          merobox stop --all || true
          merobox nuke -f || true
          echo "❌ ${{ matrix.workflow_name }} failed after $max_attempts attempts"
          exit 1

  test-merobox-integration:
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Docker
        uses: docker/setup-buildx-action@v3

      - name: Start Docker daemon
        run: |
          sudo systemctl start docker
          sudo docker --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install merobox in development mode
        run: |
          pip install -e .

      - name: Install example project dependencies
        run: |
          cd example-project
          pip install -r requirements.txt

      - name: Run merobox integration tests
        run: |
          echo "Performing initial cleanup..."
          merobox stop --all || true
          merobox nuke -f || true
          cd example-project
          echo "🧪 Running merobox integration test suite..."

          echo "🧪 Running merobox integration tests..."
          python -m pytest tests/test_merobox_integration.py -v --tb=short

          echo "✅ All merobox integration tests completed successfully!"
          echo "Cleaning up after integration tests..."
          cd .. && merobox stop --all || true
          merobox nuke -f || true
