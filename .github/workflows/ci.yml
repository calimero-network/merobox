name: CI - Format Check & Merobox Integration Testing

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CALIMERO_CONTRACTS_VERSION: "latest"

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check code formatting
        run: |
          make format-check

      - name: Show formatting differences on failure
        if: failure()
        run: |
          echo "❌ Code formatting check failed!"
          echo "💡 To fix locally, run: make format"
          echo "📋 Showing differences:"
          make format-check || true

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install merobox in development mode
        run: |
          pip install -e .

      - name: Run unit tests
        run: |
          python -m pytest merobox/tests/unit -v --tb=short

  # ── Discover workflow files for matrix ──
  list-workflows:
    name: Discover workflows
    runs-on: ubuntu-latest
    outputs:
      binary: ${{ steps.set.outputs.binary }}
      docker: ${{ steps.set.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: |
          # Binary mode: all workflows except fuzzy, auth-related, the
          # whole fault-injection family, NAT-topology, and the
          # cascade-namespace workflow.
          # The fault primitives are Docker-specific (the steps short-
          # circuit on is_binary_mode) and the paired docker-inspect
          # assertion scripts would fail outright in binary mode where
          # no container exists. NAT topology requires Docker bridges
          # + an iptables-running gateway container; the executor
          # refuses `topology: { type: nat }` in binary mode and
          # returns a clear error, but CI counts that refusal as a
          # workflow failure, so just don't run them.
          # cascade-namespace requires a merod that derives
          # app_key = blob_id(bytecode) at group creation
          # (calimero-network/core#2507). Binary mode pulls merod from
          # the latest core *release*, which lags master; until a
          # release >= 0.10.1-rc.48 ships #2507, the released merod
          # leaves app_key = [0u8; 32] and the cascade predicate matches
          # nothing. Docker mode runs against merod:edge (master), which
          # has the fix, so cascade-namespace keeps full coverage there.
          # Re-add to binary once the pinned release carries #2507.
          BINARY=$(ls workflow-examples/*.yml | \
            grep -v fuzzy-kv-store | \
            grep -v auth-example | \
            grep -v auth-image | \
            grep -v cached-frontends | \
            grep -v fault-injection | \
            grep -v nat-topology | \
            grep -v cascade-namespace | \
            jq -R -s -c 'split("\n") | map(select(length > 0)) | map({file: ., name: (split("/")[-1] | sub("\\.yml$";"") | sub("^workflow-";""))})')
          echo "binary=$BINARY" >> $GITHUB_OUTPUT

          # Docker mode: same but also exclude binary-only workflow.
          # fault-injection-tc requires a custom merod image with iproute2
          # installed (the stock image lacks `tc`); skipped in CI.
          DOCKER=$(ls workflow-examples/*.yml | \
            grep -v fuzzy-kv-store | \
            grep -v auth-example | \
            grep -v auth-image | \
            grep -v cached-frontends | \
            grep -v example-binary | \
            grep -v fault-injection-tc | \
            jq -R -s -c 'split("\n") | map(select(length > 0)) | map({file: ., name: (split("/")[-1] | sub("\\.yml$";"") | sub("^workflow-";""))})')
          echo "docker=$DOCKER" >> $GITHUB_OUTPUT

  # ── Build phase: download merod + build WASM apps ──
  build-binary:
    name: Build (binary mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download pre-built merod from latest core release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the latest release tag (including pre-releases / RCs)
          TAG=$(gh release list --repo calimero-network/core --limit 1 --json tagName --jq '.[0].tagName')
          echo "Downloading merod from calimero-network/core release: $TAG"
          gh release download "$TAG" --repo calimero-network/core \
            --pattern "merod_x86_64-unknown-linux-gnu.tar.gz" \
            --output /tmp/merod.tar.gz --clobber
          tar -xzf /tmp/merod.tar.gz -C /tmp
          chmod +x /tmp/merod
          /tmp/merod --version
          echo "✓ merod $TAG downloaded"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build workflow WASM apps
        run: |
          chmod +x workflow-examples/scripts/build_res_wasm.sh
          ./workflow-examples/scripts/build_res_wasm.sh

      - name: Upload merod binary
        uses: actions/upload-artifact@v4
        with:
          name: merod-binary
          path: /tmp/merod
          retention-days: 1

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-apps
          path: workflow-examples/res/
          retention-days: 1

  # ── Test phase (binary): run each workflow in parallel ──
  test-merobox:
    name: Binary (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [build-binary, list-workflows]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.list-workflows.outputs.binary) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Download merod binary
        uses: actions/download-artifact@v4
        with:
          name: merod-binary
          path: /tmp

      - name: Install merod
        run: |
          chmod +x /tmp/merod
          sudo cp /tmp/merod /usr/local/bin/
          merod --version

      - name: Download and install meroctl from latest core release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The tee-* replication scenarios assert via `meroctl context ls`
          # (script step, target: local), so meroctl must be on the host PATH.
          # Only merod is installed above; fetch meroctl from the same release.
          TAG=$(gh release list --repo calimero-network/core --limit 1 --json tagName --jq '.[0].tagName')
          echo "Downloading meroctl from calimero-network/core release: $TAG"
          gh release download "$TAG" --repo calimero-network/core \
            --pattern "meroctl_x86_64-unknown-linux-gnu.tar.gz" \
            --output /tmp/meroctl.tar.gz --clobber
          tar -xzf /tmp/meroctl.tar.gz -C /tmp
          chmod +x /tmp/meroctl
          sudo cp /tmp/meroctl /usr/local/bin/
          meroctl --version
          echo "✓ meroctl $TAG installed"

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-apps
          path: workflow-examples/res/

      - name: Run ${{ matrix.name }}
        run: |
          chmod +x workflow-examples/scripts/run_with_retry.sh
          ./workflow-examples/scripts/run_with_retry.sh "${{ matrix.file }}" --no-docker

  # ── Test phase (Docker): run each workflow in parallel ──
  test-merobox-docker:
    name: Docker (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [list-workflows]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.list-workflows.outputs.docker) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Docker
        uses: docker/setup-buildx-action@v3

      - name: Start Docker daemon
        run: |
          sudo systemctl start docker
          sudo docker --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Download and install meroctl from latest core release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Docker-mode tee-* scenarios still run their assert scripts on the
          # host (script step, target: local) via `meroctl context ls`, so
          # meroctl must be on the host PATH even though merod runs in a container.
          TAG=$(gh release list --repo calimero-network/core --limit 1 --json tagName --jq '.[0].tagName')
          echo "Downloading meroctl from calimero-network/core release: $TAG"
          gh release download "$TAG" --repo calimero-network/core \
            --pattern "meroctl_x86_64-unknown-linux-gnu.tar.gz" \
            --output /tmp/meroctl.tar.gz --clobber
          tar -xzf /tmp/meroctl.tar.gz -C /tmp
          chmod +x /tmp/meroctl
          sudo cp /tmp/meroctl /usr/local/bin/
          meroctl --version
          echo "✓ meroctl $TAG installed"

      - name: Set up Rust (wasm32 target for workflow apps)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build workflow WASM apps
        run: |
          chmod +x workflow-examples/scripts/build_res_wasm.sh
          ./workflow-examples/scripts/build_res_wasm.sh

      - name: Start node log capture
        run: |
          chmod +x .github/scripts/capture-node-logs.sh
          .github/scripts/capture-node-logs.sh start "$GITHUB_WORKSPACE/node-logs" /tmp/node-log-capture.state

      - name: Run ${{ matrix.name }}
        run: |
          chmod +x workflow-examples/scripts/run_with_retry.sh
          ./workflow-examples/scripts/run_with_retry.sh "${{ matrix.file }}"

      - name: Stop node log capture
        if: always()
        run: .github/scripts/capture-node-logs.sh stop /tmp/node-log-capture.state

      - name: Upload node logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-logs-docker-${{ matrix.name }}-${{ github.run_id }}
          path: node-logs/
          retention-days: 14
          if-no-files-found: ignore

  test-merobox-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Docker
        uses: docker/setup-buildx-action@v3

      - name: Start Docker daemon
        run: |
          sudo systemctl start docker
          sudo docker --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install merobox in development mode
        run: |
          pip install -e .

      - name: Install example project dependencies
        run: |
          cd example-project
          pip install -r requirements.txt

      # Build kv_store.wasm fresh from calimero-network/core master.
      # example-project/res/kv_store.wasm is checked in as a fallback for
      # local developers who don't have the core repo, but CI must
      # rebuild against current core so the CRDT op format matches the
      # `merod:edge` image the workflow runs against. A stale WASM in
      # CI causes node-2 to fail to deserialise deltas from node-1 with
      # `Invalid Option representation: ...` once core's op encoding
      # has changed.
      - name: Set up Rust (wasm32 target for kv_store)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build kv_store.wasm from current core
        run: |
          chmod +x workflow-examples/scripts/build_res_wasm.sh
          ./workflow-examples/scripts/build_res_wasm.sh
          # The build script outputs to workflow-examples/res/. Copy
          # into example-project/res/ so the integration workflow's
          # `path: ./res/kv_store.wasm` resolves to the fresh build.
          mkdir -p example-project/res
          cp workflow-examples/res/kv_store.wasm example-project/res/kv_store.wasm
          echo "::group::Rebuilt kv_store.wasm"
          ls -la example-project/res/kv_store.wasm
          echo "::endgroup::"

      - name: Start node log capture
        run: |
          chmod +x .github/scripts/capture-node-logs.sh
          .github/scripts/capture-node-logs.sh start "$GITHUB_WORKSPACE/node-logs" /tmp/node-log-capture.state

      - name: Run merobox integration tests
        run: |
          echo "Performing initial cleanup..."
          merobox stop --all || true
          merobox nuke -f || true
          cd example-project
          echo "🧪 Running merobox integration test suite..."

          echo "🧪 Running merobox integration tests..."
          python -m pytest tests/test_merobox_integration.py -v --tb=short

          echo "✅ All merobox integration tests completed successfully!"
          echo "Cleaning up after integration tests..."
          cd .. && merobox stop --all || true
          merobox nuke -f || true

      - name: Stop node log capture
        if: always()
        run: .github/scripts/capture-node-logs.sh stop /tmp/node-log-capture.state

      - name: Upload node logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-logs-integration-${{ github.run_id }}
          path: node-logs/
          retention-days: 14
          if-no-files-found: ignore
