name: CI - Format Check & Merobox Integration Testing

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CALIMERO_CONTRACTS_VERSION: "latest"
  # Harden crates.io downloads against transient CI network blips that fail the
  # maturin build of calimero-client-py during `pip install` (seen as
  # "[16] HTTP2 framing layer" / "[56] SSL_read: unexpected eof"). More retries,
  # and disable HTTP/2 multiplexing which is the source of the framing errors.
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check code formatting
        run: |
          make format-check

      - name: Show formatting differences on failure
        if: failure()
        run: |
          echo "❌ Code formatting check failed!"
          echo "💡 To fix locally, run: make format"
          echo "📋 Showing differences:"
          make format-check || true

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install merobox in development mode
        run: |
          pip install -e .

      - name: Run unit tests
        run: |
          python -m pytest merobox/tests/unit -v --tb=short

  # ── Discover workflow files for matrix ──
  list-workflows:
    name: Discover workflows
    runs-on: ubuntu-latest
    outputs:
      binary: ${{ steps.set.outputs.binary }}
      docker: ${{ steps.set.outputs.docker }}
      tee: ${{ steps.set.outputs.tee }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: |
          # Binary mode: all workflows except fuzzy, auth-related, the
          # whole fault-injection family, NAT-topology, and the
          # cascade-namespace workflow.
          # The fault primitives are Docker-specific (the steps short-
          # circuit on is_binary_mode) and the paired docker-inspect
          # assertion scripts would fail outright in binary mode where
          # no container exists. NAT topology requires Docker bridges
          # + an iptables-running gateway container; the executor
          # refuses `topology: { type: nat }` in binary mode and
          # returns a clear error, but CI counts that refusal as a
          # workflow failure, so just don't run them.
          # cascade-namespace requires a merod that derives
          # app_key = blob_id(bytecode) at group creation
          # (calimero-network/core#2507). Binary mode pulls merod from
          # the latest core *release*, which lags master; until a
          # release >= 0.10.1-rc.48 ships #2507, the released merod
          # leaves app_key = [0u8; 32] and the cascade predicate matches
          # nothing. Docker mode runs against merod:edge (master), which
          # has the fix, so cascade-namespace keeps full coverage there.
          # Re-add to binary once the pinned release carries #2507.
          # tee-* require a merod built with `--features mock-attestation`
          # (calimero-network/core#3269). That feature is default-OFF, so
          # neither the release binary (binary mode) nor merod:edge (docker
          # mode) carries it — `merod run --mock-tee` hard-errors at boot and
          # every tee-*.yml goes red before any admission logic runs. Mock-TEE
          # testing is native/dev-only by design (build recipe documented in
          # each tee-*.yml header). They are NOT dropped from CI — they run in
          # the dedicated `test-tee` job against a feature-enabled merod built by
          # `build-merod-mock`; see the `tee` matrix output below. They stay out
          # of the binary+docker matrices here because those use feature-less
          # merod (release binary / merod:edge).
          BINARY=$(ls workflow-examples/*.yml | \
            grep -v fuzzy-kv-store | \
            grep -v auth-example | \
            grep -v auth-image | \
            grep -v cached-frontends | \
            grep -v fault-injection | \
            grep -v nat-topology | \
            grep -v cascade-namespace | \
            grep -v '/tee-' | \
            jq -R -s -c 'split("\n") | map(select(length > 0)) | map({file: ., name: (split("/")[-1] | sub("\\.yml$";"") | sub("^workflow-";""))})')
          echo "binary=$BINARY" >> $GITHUB_OUTPUT

          # Docker mode: same but also exclude binary-only workflow.
          # fault-injection-tc requires a custom merod image with iproute2
          # installed (the stock image lacks `tc`); skipped in CI.
          # tee-* excluded here too — merod:edge lacks mock-attestation
          # (see the binary-mode note above).
          DOCKER=$(ls workflow-examples/*.yml | \
            grep -v fuzzy-kv-store | \
            grep -v auth-example | \
            grep -v auth-image | \
            grep -v cached-frontends | \
            grep -v example-binary | \
            grep -v fault-injection-tc | \
            grep -v '/tee-' | \
            jq -R -s -c 'split("\n") | map(select(length > 0)) | map({file: ., name: (split("/")[-1] | sub("\\.yml$";"") | sub("^workflow-";""))})')
          echo "docker=$DOCKER" >> $GITHUB_OUTPUT

          # TEE mode: the ten tee-*.yml mock-TEE admission/replication scenarios
          # excluded from the binary+docker matrices above. They run NATIVELY
          # against a merod built with --features mock-attestation (built by the
          # build-merod-mock job); the release binary and merod:edge are both
          # default-off (core#3269) and hard-error on `merod run --mock-tee`.
          TEE=$(ls workflow-examples/tee-*.yml | \
            jq -R -s -c 'split("\n") | map(select(length > 0)) | map({file: ., name: (split("/")[-1] | sub("\\.yml$";""))})')
          echo "tee=$TEE" >> $GITHUB_OUTPUT

  # ── Build phase: download merod + build WASM apps ──
  build-binary:
    name: Build (binary mode)
    runs-on: ubuntu-latest
    # Expose the resolved release tag so the binary test job pins meroctl to the
    # exact same release merod came from (no independent "latest" re-resolution).
    outputs:
      core_tag: ${{ steps.download-merod.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Download pre-built merod from latest core release
        id: download-merod
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the latest release tag (including pre-releases / RCs)
          TAG=$(gh release list --repo calimero-network/core --limit 1 --json tagName --jq '.[0].tagName')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Downloading merod from calimero-network/core release: $TAG"
          bash .github/scripts/gh-release-download-retry.sh \
            calimero-network/core "$TAG" \
            "merod_x86_64-unknown-linux-gnu.tar.gz" /tmp/merod.tar.gz
          tar -xzf /tmp/merod.tar.gz -C /tmp
          chmod +x /tmp/merod
          /tmp/merod --version
          echo "✓ merod $TAG downloaded"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build workflow WASM apps
        run: |
          chmod +x workflow-examples/scripts/build_res_wasm.sh
          ./workflow-examples/scripts/build_res_wasm.sh

      - name: Upload merod binary
        uses: actions/upload-artifact@v4
        with:
          name: merod-binary
          path: /tmp/merod
          retention-days: 1

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-apps
          path: workflow-examples/res/
          retention-days: 1

  # ── Build phase (TEE): merod WITH mock-attestation, from core source ──
  # The release binary and merod:edge are built default-off (core#3269), so they
  # cannot run `merod --mock-tee`. Build merod from the latest core release tag
  # with the feature enabled so the tee-*.yml scenarios get real CI coverage on
  # the native path. Self-contained: resolves its own tag and exposes it so the
  # tee test job pins meroctl to the exact same release.
  build-merod-mock:
    name: Build (merod + mock-attestation)
    runs-on: ubuntu-latest
    outputs:
      core_tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve latest core release tag
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release list --repo calimero-network/core --limit 1 --json tagName --jq '.[0].tagName')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building merod (mock-attestation) from core release: $TAG"

      - name: Checkout core at the release tag
        uses: actions/checkout@v4
        with:
          repository: calimero-network/core
          ref: ${{ steps.resolve.outputs.tag }}
          path: core

      - name: Set up Rust toolchain
        # core/rust-toolchain.toml pins 1.88.0; rustup auto-installs it on the
        # first cargo invocation inside core/. (The mock-attestation feature
        # exists only from core#3269 / 0.11.0-rc.17 onward — all newer releases
        # carry it, so building the latest release tag is always valid.)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
          key: merod-mock-${{ steps.resolve.outputs.tag }}

      - name: Build merod with mock-attestation
        working-directory: core
        run: |
          cargo build --release -p merod --features mock-attestation
          ls -la target/release/merod
          cp target/release/merod /tmp/merod-mock
          chmod +x /tmp/merod-mock
          /tmp/merod-mock --version

      - name: Smoke-check the mock-attestation flag is honored
        run: |
          # merod CLI: root args (--node/--home) MUST precede the subcommand:
          #   merod --node <NAME> --home <PATH> run --mock-tee
          # The feature gate is at the top of run() (crates/merod/src/cli/run.rs):
          #   - feature ABSENT  -> bail "built without mock-attestation support"
          #   - feature PRESENT -> passes the gate, then bails "Node is not
          #                        initialized" (we didn't init a node here).
          # Require the PRESENT signal and forbid the ABSENT one, so a wrong
          # invocation (usage error -> neither string) fails instead of passing
          # vacuously. timeout guards against the daemon actually starting.
          set +e
          OUT=$(timeout 20 /tmp/merod-mock --node smoke --home /tmp/smoke-home run --mock-tee 2>&1)
          echo "$OUT"
          if echo "$OUT" | grep -qi "without mock-attestation support"; then
            echo "::error::merod-mock was built WITHOUT the mock-attestation feature"; exit 1
          fi
          if ! echo "$OUT" | grep -qi "Node is not initialized"; then
            echo "::error::--mock-tee was not exercised as expected (see output above)"; exit 1
          fi
          echo "✓ --mock-tee honored past the feature gate (feature present)"

      - name: Upload merod-mock binary
        uses: actions/upload-artifact@v4
        with:
          name: merod-mock-binary
          path: /tmp/merod-mock
          retention-days: 1

  # ── Test phase (binary): run each workflow in parallel ──
  test-merobox:
    name: Binary (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [build-binary, list-workflows]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.list-workflows.outputs.binary) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Download merod binary
        uses: actions/download-artifact@v4
        with:
          name: merod-binary
          path: /tmp

      - name: Install merod
        run: |
          chmod +x /tmp/merod
          sudo cp /tmp/merod /usr/local/bin/
          merod --version

      - name: Download and install meroctl (pinned to merod's release)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.build-binary.outputs.core_tag }}
        run: |
          # The tee-* replication scenarios assert via `meroctl context ls`
          # (script step, target: local), so meroctl must be on the host PATH.
          # Pin to the SAME release merod came from (build-binary's resolved tag)
          # so the two binaries can't diverge if a new release lands mid-run.
          echo "Downloading meroctl from calimero-network/core release: $TAG"
          bash .github/scripts/gh-release-download-retry.sh \
            calimero-network/core "$TAG" \
            "meroctl_x86_64-unknown-linux-gnu.tar.gz" /tmp/meroctl.tar.gz
          tar -xzf /tmp/meroctl.tar.gz -C /tmp
          chmod +x /tmp/meroctl
          sudo cp /tmp/meroctl /usr/local/bin/
          meroctl --version
          echo "✓ meroctl $TAG installed"

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-apps
          path: workflow-examples/res/

      - name: Run ${{ matrix.name }}
        run: |
          chmod +x workflow-examples/scripts/run_with_retry.sh
          ./workflow-examples/scripts/run_with_retry.sh "${{ matrix.file }}" --no-docker

  # ── Test phase (TEE): mock-TEE scenarios, native, feature-enabled merod ──
  # These are excluded from the binary+docker matrices and run only here, on the
  # native path, against the merod built by build-merod-mock. Apps: all ten use
  # the committed res/kv_store_v2.wasm (no WASM build needed).
  test-tee:
    name: TEE (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [build-merod-mock, list-workflows]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.list-workflows.outputs.tee) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Download merod-mock binary
        uses: actions/download-artifact@v4
        with:
          name: merod-mock-binary
          path: /tmp

      - name: Install merod (mock-attestation build)
        run: |
          chmod +x /tmp/merod-mock
          sudo cp /tmp/merod-mock /usr/local/bin/merod
          merod --version

      - name: Download and install meroctl (pinned to merod-mock's release)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.build-merod-mock.outputs.core_tag }}
        run: |
          # tee-* replication asserts run `meroctl context ls` on the host
          # (script step, target: local), so meroctl must be on the host PATH.
          # Pin to the SAME release merod-mock was built from.
          echo "Downloading meroctl from calimero-network/core release: $TAG"
          bash .github/scripts/gh-release-download-retry.sh \
            calimero-network/core "$TAG" \
            "meroctl_x86_64-unknown-linux-gnu.tar.gz" /tmp/meroctl.tar.gz
          tar -xzf /tmp/meroctl.tar.gz -C /tmp
          chmod +x /tmp/meroctl
          sudo cp /tmp/meroctl /usr/local/bin/
          meroctl --version
          echo "✓ meroctl $TAG installed"

      - name: Run ${{ matrix.name }}
        run: |
          chmod +x workflow-examples/scripts/run_with_retry.sh
          ./workflow-examples/scripts/run_with_retry.sh "${{ matrix.file }}" --no-docker

      - name: Upload node logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Native nodes write to data/<node>/logs/*.log (the docker
          # capture-node-logs.sh helper is docker-only and finds nothing here).
          name: node-logs-tee-${{ matrix.name }}-${{ github.run_id }}
          path: data/*/logs/
          retention-days: 14
          if-no-files-found: ignore

  # ── Test phase (Docker): run each workflow in parallel ──
  test-merobox-docker:
    name: Docker (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [list-workflows]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.list-workflows.outputs.docker) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Docker
        uses: docker/setup-buildx-action@v3

      - name: Start Docker daemon
        run: |
          sudo systemctl start docker
          sudo docker --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Download and install meroctl from latest core release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Docker-mode tee-* scenarios still run their assert scripts on the
          # host (script step, target: local) via `meroctl context ls`, so
          # meroctl must be on the host PATH even though merod runs in a container.
          # Here merod is a container image (not a release binary), so there is no
          # release tag to pin against — resolve latest, matching the image's edge.
          TAG=$(gh release list --repo calimero-network/core --limit 1 --json tagName --jq '.[0].tagName')
          echo "Downloading meroctl from calimero-network/core release: $TAG"
          bash .github/scripts/gh-release-download-retry.sh \
            calimero-network/core "$TAG" \
            "meroctl_x86_64-unknown-linux-gnu.tar.gz" /tmp/meroctl.tar.gz
          tar -xzf /tmp/meroctl.tar.gz -C /tmp
          chmod +x /tmp/meroctl
          sudo cp /tmp/meroctl /usr/local/bin/
          meroctl --version
          echo "✓ meroctl $TAG installed"

      - name: Set up Rust (wasm32 target for workflow apps)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build workflow WASM apps
        run: |
          chmod +x workflow-examples/scripts/build_res_wasm.sh
          ./workflow-examples/scripts/build_res_wasm.sh

      - name: Start node log capture
        run: |
          chmod +x .github/scripts/capture-node-logs.sh
          .github/scripts/capture-node-logs.sh start "$GITHUB_WORKSPACE/node-logs" /tmp/node-log-capture.state

      - name: Run ${{ matrix.name }}
        run: |
          chmod +x workflow-examples/scripts/run_with_retry.sh
          ./workflow-examples/scripts/run_with_retry.sh "${{ matrix.file }}"

      - name: Stop node log capture
        if: always()
        run: .github/scripts/capture-node-logs.sh stop /tmp/node-log-capture.state

      - name: Upload node logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-logs-docker-${{ matrix.name }}-${{ github.run_id }}
          path: node-logs/
          retention-days: 14
          if-no-files-found: ignore

  test-merobox-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Docker
        uses: docker/setup-buildx-action@v3

      - name: Start Docker daemon
        run: |
          sudo systemctl start docker
          sudo docker --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install merobox in development mode
        run: |
          pip install -e .

      - name: Install example project dependencies
        run: |
          cd example-project
          pip install -r requirements.txt

      # Build kv_store.wasm fresh from calimero-network/core master.
      # example-project/res/kv_store.wasm is checked in as a fallback for
      # local developers who don't have the core repo, but CI must
      # rebuild against current core so the CRDT op format matches the
      # `merod:edge` image the workflow runs against. A stale WASM in
      # CI causes node-2 to fail to deserialise deltas from node-1 with
      # `Invalid Option representation: ...` once core's op encoding
      # has changed.
      - name: Set up Rust (wasm32 target for kv_store)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build kv_store.wasm from current core
        run: |
          chmod +x workflow-examples/scripts/build_res_wasm.sh
          ./workflow-examples/scripts/build_res_wasm.sh
          # The build script outputs to workflow-examples/res/. Copy
          # into example-project/res/ so the integration workflow's
          # `path: ./res/kv_store.wasm` resolves to the fresh build.
          mkdir -p example-project/res
          cp workflow-examples/res/kv_store.wasm example-project/res/kv_store.wasm
          echo "::group::Rebuilt kv_store.wasm"
          ls -la example-project/res/kv_store.wasm
          echo "::endgroup::"

      - name: Start node log capture
        run: |
          chmod +x .github/scripts/capture-node-logs.sh
          .github/scripts/capture-node-logs.sh start "$GITHUB_WORKSPACE/node-logs" /tmp/node-log-capture.state

      - name: Run merobox integration tests
        run: |
          echo "Performing initial cleanup..."
          merobox stop --all || true
          merobox nuke -f || true
          cd example-project
          echo "🧪 Running merobox integration test suite..."

          echo "🧪 Running merobox integration tests..."
          python -m pytest tests/test_merobox_integration.py -v --tb=short

          echo "✅ All merobox integration tests completed successfully!"
          echo "Cleaning up after integration tests..."
          cd .. && merobox stop --all || true
          merobox nuke -f || true

      - name: Stop node log capture
        if: always()
        run: .github/scripts/capture-node-logs.sh stop /tmp/node-log-capture.state

      - name: Upload node logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-logs-integration-${{ github.run_id }}
          path: node-logs/
          retention-days: 14
          if-no-files-found: ignore
